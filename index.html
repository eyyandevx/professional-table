<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Table</title>
</head>

<body>
    <!-- dark mode toggle -->
    <div class="theme-toggle" id="theme-toggle">Dark Mode</div>

    <!-- conatiner -->
    <div class="container">
        <h1>Most Active Users</h1>

        <!-- loader -->
        <div class="spinner" id="spinner" style="display: none;">
            <i class="fa-solid fa-cog fa-spin"></i>
        </div>

        <!-- table -->
        <table id="data-table" style="display: none;">
            <thead>
                <tr>
                    <th onclick="shortTable(0)" class="name-column">Name <i class="fas fa-sort" id="icon-0"></i></th>
                    <th onclick="shortTable(1)" class="email-column">Email <i class="fas fa-sort" id="icon-1"></i></th>
                    <th onclick="shortTable(2)" class="username-column">Username <i class="fas fa-sort" id="icon-2"></i>
                    </th>
                    <th onclick="shortTable(3)" class="country-column">Country <i class="fas fa-sort" id="icon-3"></i>
                    </th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- dynamically added rows -->
            </tbody>
        </table>

        <!-- pagination -->
        <div class="pagination" id="pagination" style="display: none;">
            <button type="button" id="prev-btn" title="Previous Page" onclick="prevPage()">
                <i class="fas fa-chevron-left"></i>
            </button>
            <span id="page-number">1</span>
            <button type="button" id="next-btn" title="Next Page" onclick="nextPage()">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
